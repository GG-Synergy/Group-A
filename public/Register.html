<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration</title>
    <link rel="stylesheet" href="style.css">
    <script src="group.js" defer></script>
</head>
<body>
<div class="container">
    <h1>Student Registration</h1>
    <!-- FIX: added id="registerForm" and onsubmit for group.js -->
    <form id="registerForm" action="/register" method="POST" onsubmit="showSuccess(event)">

        <label for="name">Name:</label>
        <input type="text" id="name" name="name" required>

        <label for="roll">Roll No:</label>
        <input type="text" id="roll" name="roll" required>
        
        <label>Date Of Birth:</label>
        <!-- FIX: removed stray <td> tags, wrapped DOB selects in a div -->
        <div style="display:flex; gap:8px; margin-bottom:10px;">
            <select name="day" id="Birthday_Day">
                <option value="-1">Day</option>
                <option value="1">1</option><option value="2">2</option><option value="3">3</option>
                <option value="4">4</option><option value="5">5</option><option value="6">6</option>
                <option value="7">7</option><option value="8">8</option><option value="9">9</option>
                <option value="10">10</option><option value="11">11</option><option value="12">12</option>
                <option value="13">13</option><option value="14">14</option><option value="15">15</option>
                <option value="16">16</option><option value="17">17</option><option value="18">18</option>
                <option value="19">19</option><option value="20">20</option><option value="21">21</option>
                <option value="22">22</option><option value="23">23</option><option value="24">24</option>
                <option value="25">25</option><option value="26">26</option><option value="27">27</option>
                <option value="28">28</option><option value="29">29</option><option value="30">30</option>
                <option value="31">31</option>
            </select>
            <select id="Birthday_Month" name="month">
                <option value="-1">Month</option>
                <option value="January">Jan</option><option value="February">Feb</option>
                <option value="March">Mar</option><option value="April">Apr</option>
                <option value="May">May</option><option value="June">Jun</option>
                <option value="July">Jul</option><option value="August">Aug</option>
                <option value="September">Sep</option><option value="October">Oct</option>
                <option value="November">Nov</option><option value="December">Dec</option>
            </select>
            <select name="year" id="Birthday_Year">
                <option value="-1">Year</option>
                <option value="2016">2016</option><option value="2015">2015</option>
                <option value="2014">2014</option><option value="2013">2013</option>
                <option value="2012">2012</option><option value="2011">2011</option>
                <option value="2010">2010</option><option value="2009">2009</option>
                <option value="2008">2008</option><option value="2007">2007</option>
                <option value="2006">2006</option><option value="2005">2005</option>
                <option value="2004">2004</option><option value="2003">2003</option>
                <option value="2002">2002</option><option value="2001">2001</option>
                <option value="2000">2000</option><option value="1999">1999</option>
                <option value="1998">1998</option><option value="1997">1997</option>
                <option value="1996">1996</option><option value="1995">1995</option>
                <option value="1994">1994</option><option value="1993">1993</option>
                <option value="1992">1992</option><option value="1991">1991</option>
                <option value="1990">1990</option><option value="1989">1989</option>
                <option value="1988">1988</option><option value="1987">1987</option>
                <option value="1986">1986</option><option value="1985">1985</option>
                <option value="1984">1984</option><option value="1983">1983</option>
                <option value="1982">1982</option><option value="1981">1981</option>
                <option value="1980">1980</option>
            </select>
        </div>

        <div class="gender">
            <label>Gender:</label>
            <input type="radio" name="gender" value="Male" required> Male
            <input type="radio" name="gender" value="Female"> Female
            <input type="radio" name="gender" value="Others"> Others
        </div>

        <label for="course">Course:</label>
        <select id="course" name="course" required>
            <option value="BA">BA</option>
            <option value="BSc">BSc</option>
            <option value="BCA">BCA</option>
            <option value="B.Tech">B.Tech</option>
            <option value="MA">MA</option>
            <option value="MSc">MSc</option>
            <option value="MCA">MCA</option>
            <option value="M.Tech">M.Tech</option>
            <option value="PhD">PhD</option>
        </select>

        <label>Hobbies:</label>
        <!-- FIX: removed stray closing </label>; wrapped each in proper label tags -->
        <div class="hobbies">
            <label class="hobby-option"><input type="checkbox" name="hobbies" value="Reading"> Reading</label>
            <label class="hobby-option"><input type="checkbox" name="hobbies" value="Sports"> Sports</label>
            <label class="hobby-option"><input type="checkbox" name="hobbies" value="Music"> Music</label>
            <label class="hobby-option"><input type="checkbox" name="hobbies" value="Gaming"> Gaming</label>
        </div>

        <label for="address">Address:</label>
        <textarea id="address" name="address" required></textarea>

        <br><br>
        <button type="submit" class="register-btn">REGISTER</button>
        <button type="reset" class="clear-btn">Clear</button>
    </form>

    <!-- FIX: added popup div that group.js references via getElementById('popup') -->
    <div id="popup" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
         background:#1c2b3f; border:1px solid #00ffff; border-radius:12px; padding:30px;
         color:white; z-index:999; white-space:pre-line; text-align:center; min-width:280px; box-shadow:0 0 20px #00ffff;">
        <p id="popupMessage"></p>
        <button onclick="closePopup()" class="register-btn" style="margin-top:15px;">OK</button>
    </div>
</div>
</body>
</html>
