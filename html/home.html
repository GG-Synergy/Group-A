<html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Home - Student Portal</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background-color: #0b111e;
            color: white;
            display: flex;
            height: 100vh;
        }

        
        .sidebar {
            width: 250px;
            background-color: #161f2e;
            padding: 20px;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #00bcd4;
        }

        .profile-section {
            text-align: center;
            padding-bottom: 20px;
            border-bottom: 1px solid #2d3748;
        }

        .profile-pic {
            width: 80px;
            height: 80px;
            background-color: #00bcd4;
            border-radius: 50%;
            margin: 0 auto 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
        }

        .nav-links {
            margin-top: 20px;
            list-style: none;
            padding: 0;
        }

        .nav-links li {
            padding: 15px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        .nav-links li:hover { background-color: #00bcd4; }

        
        .main-content {
            flex-grow: 1;
            padding: 40px;
        }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .card {
            background: #1c2536;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #2d3748;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="profile-section">
            <img src="C:\Users\Hp\OneDrive\Desktop\toto02 - A\html\toto.jpg" alt="profile picture" class="profile-pic">
            <h3>Katoka Aye</h3>
            <p style="font-size: 0.8rem; color: #888;">ID: 7777777</p>
        </div>
        <ul class="nav-links">
            <li>Dashboard</li>
            <li>My Courses</li>
            <li>Settings</li>
            <li style="color: #ff4d4d; margin-top: auto;">Logout</li>
        </ul>
    </div>

    <div class="main-content">
        <h1>Welcome back, Group A!</h1>
        <p>Here is what's happening with your registration today, Master.</p>

        <div class="card-grid">
            <div class="card">
                <h4>Courses</h4>
                <p>4 Active</p>
            </div>
            <div class="card">
                <h4>Notifications</h4>
                <p>2 New Messages</p>
            </div>
            <div class="card">
                <h4>Status</h4>
                <p style="color: #00bcd4;">Verified</p>
            </div>
        </div>
    </div>

</body>
</html>
